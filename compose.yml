services:
  db:
    image: postgres
    volumes:
      - ./.db:/var/lib/postgresql
    # ports:
    #   - "5432:5432"
    env_file:
      - .env
    environment:
      - PGUSER=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      dockerfile: Dockerfile
      context: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

